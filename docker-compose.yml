version: '3.9'

services:
  mongo:
    image: mongo:6.0
    container_name: minions-mongo
    ports:
      - "27017:27017"      # expose for localhost
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

# optionally add other services (api, web, etc.) when you containerize the app

volumes:
  mongo-data:
    driver: local
